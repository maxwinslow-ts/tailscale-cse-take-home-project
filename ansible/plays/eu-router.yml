---
# ── EU Subnet Router (eu-router) ─────────────────────────────────────
#
# Tailscale subnet router that makes eu-db reachable from the US app
# through the encrypted mesh. Key flags:
#   --advertise-routes  exposes eu-db's bridge IP into the tailnet
#   --snat-subnet-routes=false  preserves the real container source IP
#   --accept-routes     accepts the US Docker subnet advertised by us-app
#
- name: Configure EU Subnet Router
  hosts: eu-router
  become: true
  tasks:
    - name: Install curl
      apt:
        name: [curl]
        state: present
        update_cache: true

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        reload: true

    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Join tailnet as subnet router
      command: >
        tailscale up
        --authkey={{ ts_authkey }}
        --hostname=eu-router
        --advertise-routes={{ eu_db_bridge_ip }}/32
        --accept-routes
        --snat-subnet-routes=false
        --ssh
      register: ts_result
      changed_when: ts_result.rc == 0

    # Per Tailscale site-to-site docs: clamp TCP MSS so large segments
    # aren't dropped due to WireGuard overhead reducing the effective MTU.
    - name: Clamp MSS to MTU (per Tailscale site-to-site docs)
      shell: |
        iptables -t mangle -C FORWARD -o tailscale0 -p tcp -m tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu 2>/dev/null || \
        iptables -t mangle -A FORWARD -o tailscale0 -p tcp -m tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
