---
# ═══════════════════════════════════════════════════════════════════════
# Sovereign Mesh — Ansible Playbook
#
# Usage:
#   1. terraform apply
#   2. bash ansible/generate-inventory.sh
#   3. cd ansible && ansible-playbook site.yml
#
# Connection: uses custom orbstack connection plugin (no SSH needed).
# All VMs are Ubuntu 22.04 (Jammy) on OrbStack.
#
# Structure:
#   plays/          — one file per play (eu-db, eu-router, us-app, routes)
#   templates/      — Jinja2 templates (docker-compose, server.js, admin.js)
#   files/          — static files
# ═══════════════════════════════════════════════════════════════════════

- import_playbook: plays/eu-db.yml
- import_playbook: plays/eu-router.yml
- import_playbook: plays/us-app.yml
- import_playbook: plays/eu-db-routes.yml
- import_playbook: plays/insecure-demo.yml
